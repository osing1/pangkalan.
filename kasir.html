<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RM Pangkalan | Kasir POS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #7c3aed; --bg: #f3f4f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1e293b; -webkit-tap-highlight-color: transparent; }
        
        .sidebar-purple { background: var(--primary); border-radius: 0 40px 40px 0; position: relative; overflow: hidden; }
        .logo-box { background: rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.15); width: 100%; }
        
        .nav-item { color: rgba(255,255,255,0.6); transition: 0.3s; cursor: pointer; border-radius: 20px; }
        .nav-item:hover, .nav-item.active { color: white; background: rgba(255,255,255,0.1); }
        
        .order-card { background: white; border-radius: 35px; border: 1.5px solid #f1f5f9; transition: 0.3s; height: 100%; display: flex; flex-direction: column; }
        .order-card:hover { transform: translateY(-5px); box-shadow: 0 20px 40px rgba(124, 58, 237, 0.08); }
        
        .status-badge { padding: 5px 12px; border-radius: 12px; font-size: 9px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-unpaid { background: #fff1f2; color: #e11d48; }
        .status-paid { background: #f0fdf4; color: #16a34a; }
        
        .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; position: relative; }
        .live-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.8); opacity: 0; } }

        .receipt-container { background: #fff; padding: 25px; font-family: 'Courier New', monospace; color: #000; border: 1px solid #eee; border-radius: 10px; }
        .receipt-dashed { border-top: 2px dashed #ddd; margin: 15px 0; }

        #loginOverlay { position: fixed; inset: 0; background: var(--primary); z-index: 10000; display: flex; align-items: center; justify-content: center; padding: 15px; }
        [inert] { pointer-events: none; user-select: none; filter: blur(6px); opacity: 0.4; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- LOGIN SCREEN -->
    <div id="loginOverlay" role="dialog" aria-modal="true" aria-labelledby="loginTitle">
        <div class="bg-white p-8 md:p-12 rounded-[50px] shadow-2xl w-full max-w-md text-center animate-pop">
            <div class="bg-violet-100 w-20 h-20 rounded-[30px] flex items-center justify-center mx-auto mb-6">
                <i data-lucide="calculator" class="text-violet-600 w-10 h-10"></i>
            </div>
            <h2 id="loginTitle" class="text-2xl md:text-3xl font-black italic tracking-tighter text-slate-800 mb-2 uppercase">Cashier Sign-In</h2>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10">Point of Sale RM Pangkalan</p>
            
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-3">User ID</label>
                    <input type="text" id="loginUser" placeholder="kasir" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl outline-none focus:border-violet-600 font-bold">
                </div>
                <div class="text-left">
                    <label class="text-[9px] font-black text-slate-400 uppercase ml-3">Access PIN</label>
                    <input type="password" id="loginPass" placeholder="••••••••" class="w-full bg-slate-50 border border-slate-100 p-4 rounded-2xl outline-none focus:border-violet-600 font-bold">
                </div>
                <button onclick="handleLogin()" id="loginBtn" class="w-full bg-violet-600 text-white py-5 rounded-[22px] font-black text-xs uppercase italic tracking-widest shadow-xl shadow-violet-200 active:scale-95 transition-all mt-6">BUKA KASIR</button>
            </div>
            <p class="mt-8 text-[9px] font-bold text-slate-300 uppercase tracking-widest italic">Terminal POS v2.1</p>
        </div>
    </div>

    <!-- SIDEBAR -->
    <aside id="mainSidebar" class="hidden md:flex flex-col w-24 lg:w-72 sidebar-purple m-4 mr-0 flex-shrink-0 shadow-2xl text-white transition-all">
        <div class="p-6 lg:p-10 z-10 flex flex-col items-center lg:items-start w-full">
            <div class="logo-box mb-14 flex flex-col items-center lg:items-start text-center lg:text-left">
                <span class="text-lg lg:text-2xl font-black italic tracking-tighter leading-none mb-1 uppercase">Pangkalan</span>
                <span class="text-[8px] lg:text-[10px] font-bold uppercase tracking-[3px] opacity-70 italic">Cashier POS</span>
            </div>
            <nav class="space-y-6 w-full">
                <div class="nav-item active flex items-center justify-center lg:justify-start gap-4 p-4 font-bold transition-all"><i data-lucide="shopping-cart"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">Active Orders</span></div>
                <div class="nav-item flex items-center justify-center lg:justify-start gap-4 p-4 font-bold opacity-60"><i data-lucide="history"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">Reports</span></div>
            </nav>
        </div>
        <div class="mt-auto p-6 z-10 flex flex-col items-center lg:items-start gap-4">
            <div class="flex items-center gap-3 bg-white/10 px-4 py-3 rounded-2xl border border-white/10 w-full overflow-hidden">
                <div class="live-dot flex-shrink-0"></div>
                <div class="flex flex-col min-w-0">
                    <span class="hidden lg:block text-[9px] font-black uppercase tracking-tighter text-violet-100 opacity-60 italic leading-none">POS Online</span>
                    <span id="digitalClock" class="hidden lg:block text-[11px] font-black tracking-widest text-white mt-0.5">00:00:00</span>
                </div>
            </div>
            <button onclick="handleLogout()" class="flex items-center justify-center gap-3 bg-white/10 w-full p-4 rounded-2xl font-bold hover:bg-white/20 transition-all border border-white/10 text-white">
                <i data-lucide="log-out" class="w-5 h-5"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">Exit</span>
            </button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main id="mainContent" class="hidden flex-1 flex flex-col min-w-0 bg-transparent overflow-hidden">
        <header class="h-20 md:h-24 px-4 md:px-6 lg:px-8 flex items-center justify-between flex-shrink-0 bg-white border-b border-slate-100">
            <div>
                <h1 class="text-xl md:text-2xl font-black text-slate-800 italic leading-none uppercase tracking-tighter">Terminal Pembayaran</h1>
                <p class="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">Konfirmasi Pembayaran Pelanggan</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="text-right hidden sm:block">
                    <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest leading-none">Sales Hari Ini</p>
                    <h3 id="totalIncome" class="text-xl font-black text-violet-600 tracking-tighter">Rp 0</h3>
                </div>
                <button onclick="fetchData()" class="p-3 bg-slate-100 rounded-2xl text-slate-500 active:rotate-180 transition-all shadow-sm"><i data-lucide="refresh-cw"></i></button>
                <div class="w-10 h-10 md:w-12 md:h-12 rounded-2xl bg-violet-600 flex items-center justify-center text-white font-black text-sm" id="userInitial">KA</div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto no-scrollbar p-4 md:p-6 lg:p-8">
            <div id="kasirGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-24">
                <!-- Orders -->
            </div>
        </div>
    </main>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxbOjRecwa41sC0QAqkMoCOYKm5-YLM9nZRpnXiYDghZkuNe7RJohWXUx56EHM3Von4AQ/exec';
        let transactions = [];

        window.onload = () => {
            lucide.createIcons();
            checkAuth();
            setInterval(() => { document.getElementById('digitalClock').innerText = new Date().toLocaleTimeString('id-ID', {hour12:false}); }, 1000);
        };

        function checkAuth() {
            const user = sessionStorage.getItem('CASHIER_AUTH');
            const overlay = document.getElementById('loginOverlay');
            if (user) {
                overlay.style.display = 'none';
                overlay.setAttribute('inert', '');
                document.getElementById('mainSidebar').classList.remove('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                document.getElementById('userInitial').innerText = user.slice(0,2).toUpperCase();
                fetchData();
                setInterval(fetchData, 15000);
            } else {
                overlay.style.display = 'flex';
                overlay.removeAttribute('inert');
            }
        }

        async function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value.trim();
            const btn = document.getElementById('loginBtn');
            btn.innerText = 'AUTHENTICATING...';
            try {
                const res = await fetch(`${API_URL}?action=getData`);
                const data = await res.json();
                const validUser = data.users.find(u => u.Username.toLowerCase() === user.toLowerCase() && String(u.Password) === pass && u.Role === 'Kasir');
                if (validUser) {
                    sessionStorage.setItem('CASHIER_AUTH', user);
                    checkAuth();
                } else {
                    Swal.fire('Gagal', 'PIN Kasir salah atau role tidak diizinkan.', 'error');
                }
            } catch (e) { Swal.fire('Error', 'Gagal terhubung ke Cloud.', 'error'); }
            finally { btn.innerText = 'BUKA KASIR'; }
        }

        async function fetchData() {
            try {
                const res = await fetch(`${API_URL}?action=getData`);
                const data = await res.json();
                transactions = data.transactions;
                renderKasir();
            } catch (e) { console.error(e); }
        }

        function renderKasir() {
            const grid = document.getElementById('kasirGrid');
            const income = transactions.reduce((s, t) => s + (t.Status !== 'Pending' ? Number(t.Total) : 0), 0);
            document.getElementById('totalIncome').innerText = `Rp ${income.toLocaleString()}`;

            const activeOrders = [...transactions].reverse();
            if(activeOrders.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-32 text-center opacity-20 font-black italic tracking-widest uppercase">Belum Ada Pesanan</div>`;
                return;
            }

            grid.innerHTML = activeOrders.map(t => {
                const isPaid = t.Status !== 'Pending';
                return `
                <div class="order-card p-8 animate-pop">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <span class="text-[10px] font-black text-slate-400 uppercase italic">#${t.ID.slice(-4)}</span>
                            <h3 class="text-lg font-black text-slate-800 leading-none mt-1 truncate w-32">${t.Role}</h3>
                        </div>
                        <span class="status-badge ${isPaid ? 'status-paid' : 'status-unpaid'}">${isPaid ? 'LUNAS' : 'PENDING'}</span>
                    </div>
                    <div class="flex-1 mb-8 overflow-y-auto max-h-32 no-scrollbar border-b border-slate-50">
                        <p class="text-[9px] font-bold text-slate-300 uppercase tracking-widest mb-2">Daftar Item:</p>
                        <p class="text-xs font-bold text-slate-700 leading-relaxed uppercase italic">${t.Items}</p>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-[10px] font-black text-slate-400 uppercase italic mb-6">
                        <span>${t.Type}</span>
                        <span>${new Date(t.Date).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>
                    </div>
                    <div class="pt-6 border-t border-slate-100 flex flex-col gap-4">
                        <div class="flex justify-between items-center">
                            <span class="text-[10px] font-black text-slate-400 uppercase italic">Total Bayar</span>
                            <span class="text-xl font-black text-violet-600 tracking-tighter italic">Rp ${Number(t.Total).toLocaleString()}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="printReceipt('${t.ID}')" class="p-4 bg-slate-100 rounded-2xl hover:bg-slate-200 transition-all text-slate-600"><i data-lucide="printer" class="w-4 h-4"></i></button>
                            ${!isPaid ? `
                                <button onclick="confirmPayment('${t.ID}')" class="flex-1 py-4 bg-violet-600 text-white rounded-2xl font-black text-[10px] uppercase shadow-lg shadow-violet-100 active:scale-95 transition-all">BAYAR SEKARANG</button>
                            ` : `
                                <button disabled class="flex-1 py-4 bg-slate-50 text-slate-300 rounded-2xl font-black text-[10px] uppercase">SUDAH BAYAR</button>
                            `}
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        async function confirmPayment(id) {
            const { isConfirmed } = await Swal.fire({
                title: '<span class="italic font-black text-xl uppercase tracking-tighter">Konfirmasi Bayar?</span>',
                text: `Pesanan #${id.slice(-4)} akan diteruskan ke dapur.`,
                icon: 'question',
                showCancelButton: true, confirmButtonColor: '#7c3aed', confirmButtonText: 'YA, LUNAS',
                customClass: { popup: 'rounded-[40px] p-8', confirmButton: 'rounded-2xl font-black py-4 px-10' }
            });
            if(isConfirmed) {
                Swal.fire({ title: 'Memproses...', didOpen: () => Swal.showLoading() });
                try {
                    await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ action: 'updateOrderStatus', id: id, status: 'Cooking' }) });
                    fetchData();
                    Swal.fire({ icon: 'success', title: 'Berhasil', timer: 1500, showConfirmButton: false });
                } catch (e) { Swal.fire('Error', 'Koneksi database gagal.', 'error'); }
            }
        }

        function printReceipt(id) {
            const t = transactions.find(x => x.ID === id);
            const qr = `https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(window.location.origin)}`;
            Swal.fire({
                title: 'Thermal Struk POS',
                html: `
                <div class="receipt-container text-left text-xs uppercase">
                    <div class="text-center font-black text-xl italic mb-1">RM PANGKALAN</div>
                    <div class="text-center text-[9px] mb-4">Cita Rasa Autentik Indonesia<br>ID: ${t.ID}</div>
                    <div class="flex justify-between text-[10px]"><span>Tgl: ${new Date(t.Date).toLocaleDateString()}</span><span>Jam: ${new Date(t.Date).toLocaleTimeString()}</span></div>
                    <div class="receipt-dashed"></div>
                    <div class="space-y-1">
                        ${t.Items.split(',').map(i => `<div class="flex justify-between italic font-bold"><span>${i.trim()}</span><span>x1</span></div>`).join('')}
                    </div>
                    <div class="receipt-dashed"></div>
                    <div class="flex justify-between font-black text-lg italic"><span>TOTAL</span><span>Rp ${Number(t.Total).toLocaleString()}</span></div>
                    <div class="receipt-dashed"></div>
                    <div class="flex flex-col items-center mt-4">
                        <img src="${qr}" class="w-32 h-32 border p-2 mb-2 bg-white">
                        <p class="text-[8px] font-bold text-slate-400 tracking-[2px]">SCAN UNTUK PESAN LAGI</p>
                    </div>
                    <div class="mt-4 text-center text-[10px] italic border-t pt-4 font-black text-slate-300">TERIMA KASIH ATAS KUNJUNGANNYA</div>
                </div>`,
                confirmButtonText: 'CETAK SEKARANG', confirmButtonColor: '#7c3aed', customClass: { popup: 'rounded-[35px]' }
            });
        }

        function handleLogout() { sessionStorage.removeItem('CASHIER_AUTH'); location.reload(); }
    </script>
</body>
</html>
