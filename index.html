<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RM PANGKALAN | Professional Order</title>
    
    <!-- PWA Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#7c3aed">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3448/3448609.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        :root { --primary: #7c3aed; --bg: #f3f4f9; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: #1f2937; -webkit-tap-highlight-color: transparent; }
        
        #splashScreen { 
            position: fixed; inset: 0; background: var(--primary); z-index: 9000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            transition: opacity 0.4s ease;
        }

        /* --- SIDEBAR PRO DESIGN --- */
        .sidebar-purple { background: var(--primary); border-radius: 0 40px 40px 0; position: relative; overflow: hidden; }
        .logo-box { background: rgba(255,255,255,0.1); border-radius: 25px; padding: 20px; border: 1px solid rgba(255,255,255,0.15); width: 100%; }
        
        .nav-item { color: rgba(255,255,255,0.6); transition: 0.3s; cursor: pointer; border-radius: 20px; }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.05); }
        .nav-item.active { background: white; color: var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.15); }
        
        .cat-card { 
            background: white; border-radius: 22px; padding: 12px; min-width: 85px; 
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; transition: 0.3s; border: 2px solid transparent;
        }
        .cat-card.active { border-color: var(--primary); background: #fdfbff; }
        .cat-card .icon-box { background: #f3f4f6; border-radius: 14px; padding: 10px; transition: 0.3s; }
        .cat-card.active .icon-box { background: var(--primary); color: white; }
        
        .food-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; overflow: hidden; border: 1px solid #f1f5f9; background: white; border-radius: 35px; }
        .food-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -10px rgba(124, 58, 237, 0.15); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .animate-pop { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
        
        /* --- SIDE DRAWER --- */
        #cartDrawer { transition: visibility 0.3s; visibility: hidden; }
        #cartDrawer.active { visibility: visible; }
        #drawerOverlay { transition: opacity 0.3s ease; opacity: 0; }
        #cartDrawer.active #drawerOverlay { opacity: 1; }
        #drawerContent { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(100%); }
        #cartDrawer.active #drawerContent { transform: translateX(0); }

        /* --- MODERN PRO MODAL --- */
        .swal2-popup.detail-modal { 
            border-radius: 50px !important; 
            padding: 1.25rem 0.2rem !important; 
            width: 98% !important; 
            max-width: 500px !important; 
        }

        .checkout-input-pro { width: 100%; background: #f8fafc; border: 1.5px solid #e2e8f0; border-radius: 18px; padding: 14px 18px; font-size: 14px; font-weight: 600; outline: none; transition: 0.2s; }
        .checkout-input-pro:focus { border-color: var(--primary); background: white; }

        .service-option, .payment-option {
            cursor: pointer; border-radius: 20px; background: #fff; border: 2.5px solid #f1f5f9;
            transition: 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 12px;
        }
        .service-option.active, .payment-option.active { border-color: #7c3aed; background-color: #fdfbff; box-shadow: 0 4px 15px rgba(124, 58, 237, 0.1); }

        .order-card-row {
            background: #fff; border-radius: 22px; padding: 10px 14px; border: 1.5px solid #f1f5f9;
            display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; gap: 8px;
        }

        .qty-pill-small {
            background: #f8fafc; border-radius: 14px; border: 1px solid #e2e8f0;
            display: flex; align-items: center; gap: 8px; padding: 6px 10px; flex-shrink: 0;
        }

        .live-dot { width: 10px; height: 10px; border-radius: 50%; background: #22c55e; position: relative; }
        .live-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid #22c55e; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.8); opacity: 0; } }

        .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: skeleton-pulse 1.5s infinite; }

        /* --- TRACKING UI --- */
        .track-card {
            background: #fff; border-radius: 35px; padding: 24px; border: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.04); margin-bottom: 16px;
        }
        .track-step-container { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; }
        .track-step { position: relative; display: flex; flex-direction: column; align-items: center; flex: 1; z-index: 10; }
        .track-line { position: absolute; height: 3px; width: 100%; background: #f1f5f9; top: 12px; left: 50%; z-index: 0; }
        .track-circle { width: 24px; height: 24px; border-radius: 50%; background: #f1f5f9; border: 5px solid white; box-shadow: 0 0 0 1px #f1f5f9; transition: 0.4s; }
        .track-step.active .track-circle { background: var(--primary); }
        .track-step.active .track-line { background: var(--primary); }
        .track-label { font-size: 9px; font-weight: 800; color: #94a3b8; margin-top: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
        .track-step.active .track-label { color: var(--primary); }

        .status-pill { padding: 6px 14px; border-radius: 14px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.5px; }
        .status-pending { background: #fff7ed; color: #ea580c; }
        .status-cooking { background: #fefce8; color: #ca8a04; }
        .status-ready { background: #f0fdf4; color: #16a34a; }
    </style>
</head>
<body class="overflow-hidden">

    <div id="splashScreen">
        <div class="bg-white p-6 rounded-[40px] shadow-2xl animate-bounce mb-6"><i data-lucide="utensils" class="w-12 h-12 text-violet-600"></i></div>
        <h1 class="text-white text-3xl font-black italic tracking-tighter uppercase">FoodMeal.</h1>
        <p class="text-violet-200 text-[10px] mt-2 uppercase font-black tracking-[4px]">RM Pangkalan</p>
    </div>

    <div class="flex h-screen overflow-hidden">
        <!-- SIDEBAR -->
        <aside class="hidden md:flex flex-col w-24 lg:w-72 sidebar-purple m-4 mr-0 flex-shrink-0 shadow-2xl text-white transition-all">
            <div class="p-6 lg:p-10 z-10 flex flex-col items-center lg:items-start w-full">
                <div class="logo-box mb-14 flex flex-col items-center lg:items-start text-center lg:text-left">
                    <span class="text-lg lg:text-2xl font-black italic tracking-tighter leading-none mb-1">PANGKALAN</span>
                    <span class="text-[8px] lg:text-[10px] font-bold uppercase tracking-[3px] opacity-70 italic">Food Meal</span>
                </div>
                <nav class="space-y-6 w-full">
                    <div onclick="switchTab('menu')" id="side-nav-menu" class="nav-item active flex items-center justify-center lg:justify-start gap-4 p-4 font-bold transition-all"><i data-lucide="layout-grid"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">Dashboard</span></div>
                    <div onclick="switchTab('track')" id="side-nav-track" class="nav-item flex items-center justify-center lg:justify-start gap-4 p-4 font-bold transition-all"><i data-lucide="clock"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">History</span></div>
                    <a href="admin.html" class="nav-item flex items-center justify-center lg:justify-start gap-4 p-4 font-bold opacity-60"><i data-lucide="settings"></i> <span class="hidden lg:block text-xs uppercase tracking-widest">Admin</span></a>
                </nav>
            </div>
            
            <div class="mt-auto p-6 z-10 flex flex-col items-center lg:items-start gap-4">
                <div class="flex items-center gap-3 bg-white/10 px-4 py-3 rounded-2xl border border-white/10 w-full overflow-hidden">
                    <div id="statusIndicator" class="live-dot flex-shrink-0"></div>
                    <div class="flex flex-col min-w-0">
                        <span id="syncStatus" class="hidden lg:block text-[9px] font-black uppercase tracking-tighter text-violet-100 opacity-60 italic">Online</span>
                        <span id="digitalClock" class="hidden lg:block text-[11px] font-black tracking-widest text-white mt-0.5">00:00:00</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-transparent overflow-hidden">
            <!-- Header -->
            <header class="h-20 md:h-24 px-4 md:px-6 lg:px-8 flex items-center justify-between flex-shrink-0">
                <div id="headerInfo">
                    <h2 class="text-lg md:text-xl font-extrabold text-slate-800 leading-none mb-1" id="welcomeMsg">Hey, Pelanggan!</h2>
                    <p class="text-[9px] md:text-[10px] text-slate-400 font-bold uppercase tracking-widest italic opacity-70">Cita rasa autentik RM Pangkalan</p>
                </div>
                <div class="flex items-center gap-3">
                    <button onclick="syncData(true)" class="p-2.5 md:p-3 bg-white rounded-xl shadow-sm text-violet-600 border border-slate-50 active:scale-90 transition-all"><i data-lucide="refresh-cw" class="w-4.5 h-4.5"></i></button>
                    <button onclick="toggleDrawer(true)" class="relative p-2.5 md:p-3 bg-white rounded-xl shadow-sm text-violet-600 border border-slate-50 xl:hidden">
                        <i data-lucide="shopping-bag" class="w-4.5 h-4.5 md:w-5 md:h-5"></i>
                        <span id="cartBadge" class="absolute -top-0.5 -right-0.5 bg-pink-500 text-white text-[9px] font-black w-5 h-5 rounded-full flex items-center justify-center border-2 border-white hidden">0</span>
                    </button>
                    <div class="w-10 h-10 md:w-12 md:h-12 rounded-2xl overflow-hidden shadow-sm border-2 border-white cursor-pointer hover:border-violet-100 ml-1" onclick="changeName()">
                        <img id="userAvatar" src="https://ui-avatars.com/api/?name=Guest&background=7c3aed&color=fff" class="w-full h-full object-cover">
                    </div>
                </div>
            </header>

            <div id="tabMenu" class="flex-1 overflow-y-auto no-scrollbar px-3 md:px-6 lg:px-8 pb-32">
                <section class="bg-slate-900 h-36 md:h-44 lg:h-48 rounded-[35px] md:rounded-[40px] relative overflow-hidden mb-6 group shadow-2xl">
                    <img src="https://images.unsplash.com/photo-1544025162-d76694265947?auto=format&fit=crop&q=80&w=800" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-700">
                    <div class="relative z-10 p-6 md:p-10 h-full flex flex-col justify-center max-w-md text-white">
                        <h3 class="text-xl md:text-3xl font-black italic leading-tight uppercase tracking-tighter">Voucher Makan.<br><span class="text-violet-400">PANGKALAN20</span></h3>
                    </div>
                </section>

                <section class="mb-6">
                    <div class="flex gap-2.5 md:gap-4 lg:gap-6 overflow-x-auto no-scrollbar pb-2" id="categoryContainer">
                        <div onclick="filterMenu('All')" class="cat-card active" id="cat-all"><div class="icon-box"><i data-lucide="layout-grid" class="w-4 h-4"></i></div><span class="text-[9px] font-black uppercase tracking-tighter">Semua</span></div>
                        <div onclick="filterMenu('Paket')" class="cat-card" id="cat-paket"><div class="icon-box"><i data-lucide="users" class="w-4 h-4"></i></div><span class="text-[9px] font-black uppercase tracking-tighter">Paket</span></div>
                        <div onclick="filterMenu('Makanan')" class="cat-card" id="cat-makanan"><div class="icon-box"><i data-lucide="sandwich" class="w-4 h-4"></i></div><span class="text-[9px] font-black uppercase tracking-tighter">Makan</span></div>
                        <div onclick="filterMenu('Minuman')" class="cat-card" id="cat-minuman"><div class="icon-box"><i data-lucide="cup-soda" class="w-4 h-4"></i></div><span class="text-[9px] font-black uppercase tracking-tighter">Minum</span></div>
                    </div>
                </section>

                <div id="menuGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 lg:gap-8"></div>
            </div>

            <div id="tabTrack" class="hidden flex-1 overflow-y-auto no-scrollbar px-3 md:px-6 lg:px-8 pb-32">
                <div class="max-w-2xl mx-auto space-y-4" id="orderTrackingList"></div>
            </div>
        </main>

        <!-- Right Panel Desktop -->
        <aside id="rightPanel" class="hidden xl:flex flex-col w-[380px] m-4 ml-0 bg-white rounded-[40px] shadow-2xl overflow-hidden border border-slate-50">
            <div class="p-8 pb-4 text-center">
                <div class="bg-violet-600 p-8 rounded-[35px] text-white relative overflow-hidden mb-8 shadow-xl shadow-violet-100">
                    <h4 class="text-xl font-black italic uppercase tracking-tighter leading-none mb-1">Keranjang</h4>
                    <p class="text-[9px] font-bold opacity-60 uppercase tracking-widest">RM PANGKALAN</p>
                    <i data-lucide="shopping-bag" class="absolute -right-4 -bottom-4 w-24 h-24 opacity-10"></i>
                </div>
            </div>
            <div id="cartItems" class="flex-1 px-8 overflow-y-auto no-scrollbar space-y-3"></div>
            <div class="p-8 bg-slate-50 border-t">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-black text-slate-400 uppercase tracking-widest italic">Total Tagihan</span>
                    <span id="totalCart" class="text-2xl font-black text-violet-600">Rp 0</span>
                </div>
                <button onclick="openCheckoutModal()" class="w-full bg-violet-600 text-white py-5 rounded-[25px] font-black shadow-lg uppercase text-xs italic tracking-widest active:scale-95 transition-all">Pesan Sekarang</button>
            </div>
        </aside>
    </div>

    <!-- SIDE DRAWER -->
    <div id="cartDrawer" class="fixed inset-0 z-[100]">
        <div id="drawerOverlay" class="absolute inset-0 bg-black/30 backdrop-blur-sm" onclick="toggleDrawer(false)"></div>
        <div id="drawerContent" class="absolute right-0 top-0 bottom-0 w-[90%] max-w-sm bg-white shadow-2xl flex flex-col rounded-l-[45px]">
            <div class="p-8 border-b flex items-center justify-between">
                <h3 class="text-xl font-black italic text-slate-800 tracking-tighter uppercase">Keranjang</h3>
                <button onclick="toggleDrawer(false)" class="p-2 bg-slate-100 rounded-full text-slate-400"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div id="cartItemsMobile" class="flex-1 overflow-y-auto no-scrollbar p-6 space-y-4"></div>
            <div class="p-8 bg-slate-50 border-t">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-black text-slate-400 uppercase italic tracking-widest">Total</span>
                    <span id="totalCartMobile" class="text-2xl font-black text-violet-600">Rp 0</span>
                </div>
                <button onclick="openCheckoutModal()" class="w-full bg-violet-600 text-white py-5 rounded-2xl font-black shadow-lg uppercase text-xs italic tracking-widest active:scale-95">Bayar Sekarang</button>
            </div>
        </div>
    </div>

    <!-- Bottom Nav -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md p-3 px-10 flex justify-between items-center border-t border-slate-100 z-50 rounded-t-[35px] shadow-2xl">
        <button onclick="switchTab('menu')" id="nav-menu" class="text-violet-600 flex flex-col items-center gap-1 transition-all"><i data-lucide="layout-grid" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-tighter">Dash</span></button>
        <button onclick="switchTab('track')" id="nav-track" class="text-slate-300 flex flex-col items-center gap-1 transition-all"><i data-lucide="clock" class="w-6 h-6"></i><span class="text-[9px] font-bold uppercase tracking-tighter">Lacak</span></button>
        <a href="admin.html" class="text-slate-300 flex flex-col items-center gap-1"><i data-lucide="user" class="w-6 h-6"></i><span class="text-[9px] font-black uppercase tracking-tighter">Admin</span></a>
    </nav>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbxbOjRecwa41sC0QAqkMoCOYKm5-YLM9nZRpnXiYDghZkuNe7RJohWXUx56EHM3Von4AQ/exec';
        let DB = { menu: [], transactions: [] };
        let lastTrxHash = "";
        let cart = [];
        let activeCategory = 'All';
        let activeTab = 'menu';
        let selectedPayment = 'Tunai';
        let selectedService = 'Dine-in';
        let myOrderIds = JSON.parse(localStorage.getItem('MY_ORDERS') || '[]');
        let syncInterval;

        window.onload = () => {
            lucide.createIcons();
            const cache = localStorage.getItem('RM_DATA_CACHE');
            if(cache) { DB = JSON.parse(cache); renderMenu(); setTimeout(hideSplash, 300); }
            syncData(true);
            updateHeaderUI();
            startPolling(15000);
            updateClock();
            setInterval(updateClock, 1000);
        };

        function updateClock() {
            const el = document.getElementById('digitalClock');
            if(el) el.innerText = new Date().toLocaleTimeString('id-ID', { hour12: false });
        }

        function hideSplash() {
            const s = document.getElementById('splashScreen');
            if(s) { s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 400); }
        }

        function startPolling(ms) {
            if(syncInterval) clearInterval(syncInterval);
            syncInterval = setInterval(() => syncData(false), ms);
        }

        async function syncData(force = false) {
            try {
                const res = await fetch(`${API_URL}?action=getData`);
                const data = await res.json();
                const newHash = JSON.stringify(data.transactions);
                if (force || newHash !== lastTrxHash) {
                    lastTrxHash = newHash;
                    DB = data;
                    localStorage.setItem('RM_DATA_CACHE', JSON.stringify(data));
                    const syncEl = document.getElementById('syncStatus');
                    if(syncEl) syncEl.innerText = 'Online';
                    if (activeTab === 'menu') renderMenu();
                    if (activeTab === 'track') renderTracking();
                    checkOrderStatus();
                    hideSplash();
                }
            } catch (e) { 
                const syncEl = document.getElementById('syncStatus');
                if(syncEl) syncEl.innerText = 'Offline'; 
                hideSplash();
            }
        }

        function checkOrderStatus() {
            myOrderIds.forEach(id => {
                const trx = DB.transactions.find(t => t.ID === id);
                if(trx && trx.Status === 'Ready' && !localStorage.getItem(`NOTIF_${id}`)) {
                    Swal.fire({ icon: 'success', title: 'Pesanan Siap!', text: `Pesanan #${id.slice(-4)} sudah siap disajikan.`, confirmButtonColor: '#7c3aed' });
                    localStorage.setItem(`NOTIF_${id}`, 'true');
                }
            });
        }

        function switchTab(tab) {
            activeTab = tab;
            document.getElementById('tabMenu').classList.toggle('hidden', tab !== 'menu');
            document.getElementById('tabTrack').classList.toggle('hidden', tab !== 'track');
            document.getElementById('side-nav-menu')?.classList.toggle('active', tab === 'menu');
            document.getElementById('side-nav-track')?.classList.toggle('active', tab === 'track');
            
            const nm = document.getElementById('nav-menu'), nt = document.getElementById('nav-track');
            if(nm) nm.classList.replace(tab === 'menu' ? 'text-slate-300' : 'text-violet-600', tab === 'menu' ? 'text-violet-600' : 'text-slate-300');
            if(nt) nt.classList.replace(tab === 'track' ? 'text-slate-300' : 'text-violet-600', tab === 'track' ? 'text-violet-600' : 'text-slate-300');

            startPolling(tab === 'track' ? 3000 : 15000);
            if(tab === 'track') renderTracking();
            lucide.createIcons();
        }

        function renderMenu() {
            const grid = document.getElementById('menuGrid');
            if(!grid || activeTab !== 'menu' || !DB.menu || DB.menu.length === 0) return;
            grid.innerHTML = DB.menu.filter(m => activeCategory === 'All' || m.Category === activeCategory).map((m, idx) => `
                <div class="food-card p-4 flex flex-col animate-pop" style="animation-delay: ${idx * 0.03}s">
                    <div onclick="showDetail('${m.ID}')" class="w-full aspect-[4/3] rounded-[22px] overflow-hidden mb-4 relative group bg-slate-100">
                        <img src="${m.Img.includes('?') ? m.Img : m.Img+'?w=400&q=80'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500" onerror="this.src='https://placehold.co/400x300?text=RM+Pangkalan'">
                    </div>
                    <h4 class="font-extrabold text-[13px] text-slate-800 line-clamp-1 italic uppercase tracking-tighter leading-none mb-1">${m.Name}</h4>
                    <p class="text-[9px] font-medium text-slate-400 mt-1 mb-4 line-clamp-2 leading-relaxed opacity-60">${m.Description}</p>
                    <div class="mt-auto flex items-center justify-between">
                        <span class="text-sm font-black text-violet-600 italic tracking-tighter">Rp ${Number(m.Price).toLocaleString()}</span>
                        <button onclick="addToCart('${m.ID}')" class="bg-violet-600 text-white w-9 h-9 rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i data-lucide="plus" class="w-4 h-4"></i></button>
                    </div>
                </div>`).join('');
            lucide.createIcons();
        }

        function addToCart(id) { 
            const item = DB.menu.find(m => m.ID == id); 
            if (item) { 
                cart.push({...item, cartId: Date.now()}); updateCartUI(); 
                if(Swal.isVisible()) renderReview(); 
                const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 800 });
                Toast.fire({ icon: 'success', title: 'Berhasil ditambahkan' });
            } 
        }

        function removeFromCartOne(id) { const idx = cart.findLastIndex(i => i.ID == id); if (idx > -1) cart.splice(idx, 1); updateCartUI(); if(Swal.isVisible()) renderReview(); }
        
        function updateCartUI() {
            const lists = [document.getElementById('cartItems'), document.getElementById('cartItemsMobile')];
            const totals = [document.getElementById('totalCart'), document.getElementById('totalCartMobile')];
            const badge = document.getElementById('cartBadge');
            
            if (cart.length === 0) { 
                lists.forEach(l => { if(l) l.innerHTML = `<div class="py-20 opacity-20 text-center flex flex-col items-center justify-center gap-3 italic tracking-widest text-[10px] font-bold"><i data-lucide="shopping-cart" class="w-10 h-10"></i> KOSONG</div>`; });
                totals.forEach(t => { if(t) t.innerText = 'Rp 0'; });
                if(badge) badge.classList.add('hidden');
                lucide.createIcons(); return; 
            }
            
            if(badge) { badge.innerText = cart.length; badge.classList.remove('hidden'); }
            const grouped = cart.reduce((acc, i) => { if(!acc[i.ID]) acc[i.ID] = {...i, qty: 0}; acc[i.ID].qty++; return acc; }, {});
            const html = Object.values(grouped).map(i => `
                <div class="order-card-row bg-slate-50/50 border-slate-100 shadow-sm animate-pop">
                    <div class="qty-pill-small bg-white">
                        <button onclick="removeFromCartOne('${i.ID}')" class="text-red-500 font-black text-xs hover:scale-125 transition-transform">-</button>
                        <span class="text-xs font-black w-3 text-center">${i.qty}</span>
                        <button onclick="addToCart('${i.ID}')" class="text-violet-600 font-black text-xs hover:scale-125 transition-transform">+</button>
                    </div>
                    <p class="flex-1 px-1.5 text-[11px] font-bold text-slate-800 truncate uppercase text-center tracking-tighter leading-none">${i.Name}</p>
                    <span class="text-[11px] font-black text-violet-600 w-16 text-right">Rp ${(i.Price*i.qty).toLocaleString()}</span>
                </div>`).join('');
            
            lists.forEach(l => { if(l) l.innerHTML = html; });
            const sub = cart.reduce((s, i) => s + Number(i.Price), 0);
            totals.forEach(t => { if(t) t.innerText = `Rp ${sub.toLocaleString()}`; });
            lucide.createIcons();
        }

        function renderReview() {
            const container = document.getElementById('reviewContent');
            if(!container) return; 
            const grouped = cart.reduce((acc, i) => { if(!acc[i.ID]) acc[i.ID] = {...i, qty: 0}; acc[i.ID].qty++; return acc; }, {});
            const sub = cart.reduce((s, i) => s + Number(i.Price), 0);
            const total = sub + 1500;
            const name = localStorage.getItem('LAST_CUST_NAME') || '';
            const table = document.getElementById('inputTable')?.value || '';
            
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="grid grid-cols-2 gap-3 mb-2">
                        <div onclick="selectedService='Dine-in';renderReview()" class="service-option ${selectedService==='Dine-in'?'active':''}"><span class="text-[10px] font-black uppercase italic text-slate-700">Makan Sini</span></div>
                        <div onclick="selectedService='Take-away';renderReview()" class="service-option ${selectedService==='Take-away'?'active':''}"><i data-lucide="shopping-bag" class="w-4 h-4 mb-0.5 text-slate-500"></i><span class="text-[10px] font-black uppercase italic text-slate-700">Bawa Pulang</span></div>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="inputName" placeholder="Nama Anda" value="${name}" class="checkout-input-pro">
                        <input type="number" id="inputTable" placeholder="No Meja" value="${table}" class="checkout-input-pro" ${selectedService === 'Take-away' ? 'disabled style="opacity: 0.3"' : ''}>
                    </div>
                    <div class="space-y-2 max-h-[160px] overflow-y-auto no-scrollbar py-1">
                        ${Object.values(grouped).map(i => `<div class="order-card-row"><div class="qty-pill-small"><button onclick="removeFromCartOne('${i.ID}')" class="text-red-500 font-black text-[10px]">-</button><span class="text-[11px] font-black">${i.qty}</span><button onclick="addToCart('${i.ID}')" class="text-violet-600 font-black text-[10px]">+</button></div><p class="flex-1 px-1 text-[11px] font-bold text-slate-800 truncate uppercase text-center tracking-tighter">${i.Name}</p><span class="text-[12px] font-black text-violet-600 w-16 text-right">Rp ${(i.Price*i.qty).toLocaleString()}</span></div>`).join('')}
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div onclick="selectedPayment='Tunai';renderReview()" class="payment-option ${selectedPayment==='Tunai'?'active':''}"><i data-lucide="banknote" class="w-5 h-5 mb-1 ${selectedPayment==='Tunai'?'text-green-600':'text-slate-300'}"></i><span class="text-[8px] font-black uppercase italic">Tunai</span></div>
                        <div onclick="selectedPayment='QRIS';renderReview()" class="payment-option ${selectedPayment==='QRIS'?'active':''}"><i data-lucide="qr-code" class="w-5 h-5 mb-1 ${selectedPayment==='QRIS'?'text-blue-600':'text-slate-300'}"></i><span class="text-[8px] font-black uppercase italic">QRIS</span></div>
                        <div onclick="selectedPayment='Bank';renderReview()" class="payment-option ${selectedPayment==='Bank'?'active':''}"><i data-lucide="credit-card" class="w-5 h-5 mb-1 ${selectedPayment==='Bank'?'text-violet-600':'text-slate-300'}"></i><span class="text-[8px] font-black uppercase italic text-center">Bank</span></div>
                    </div>
                    <div class="pt-4 border-t flex justify-between items-center"><span class="text-[10px] font-black text-slate-400 uppercase italic">TOTAL + SERVICE</span><span class="text-3xl font-black text-violet-600 tracking-tighter">Rp ${total.toLocaleString()}</span></div>
                </div>`;
            lucide.createIcons();
        }

        function openCheckoutModal() {
            if (cart.length === 0) return;
            toggleDrawer(false);
            Swal.fire({
                title: '<div class="swal-title-pro uppercase tracking-tighter">Review Pesanan</div>', html: `<div id="reviewContent"></div>`,
                showCancelButton: true, confirmButtonText: 'Proses Pesanan', cancelButtonText: 'Cancel',
                confirmButtonColor: '#7c3aed', cancelButtonColor: '#64748b', reverseButtons: true,
                customClass: { popup: 'detail-modal', confirmButton: 'rounded-[18px] font-black py-4 px-10 order-2 text-xs uppercase italic shadow-lg shadow-violet-100', cancelButton: 'rounded-[18px] font-black py-4 px-10 order-1 text-xs uppercase italic' },
                didOpen: () => renderReview(),
                preConfirm: () => {
                    const n = document.getElementById('inputName')?.value, t = document.getElementById('inputTable')?.value;
                    if(!n) { Swal.showValidationMessage('Nama wajib diisi!'); return false; }
                    localStorage.setItem('LAST_CUST_NAME', n); return { n, t };
                }
            }).then((res) => { if (res.isConfirmed) processFinalOrder(res.value); });
        }

        async function processFinalOrder(data) {
            Swal.fire({ title: 'Mengirim Pesanan...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
            const oid = 'ORD-' + Math.floor(Date.now()/1000).toString().slice(-6);
            try {
                await fetch(API_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ 
                    action: 'addOrder', id: oid, items: cart.map(i => i.Name).join(', '), 
                    total: cart.reduce((s,i)=>s+Number(i.Price),0) + 1500, 
                    role: data.n, type: `${selectedService} ${data.t ? '[Meja '+data.t+'] ' : ''}[${selectedPayment}]` 
                }) });
                myOrderIds.unshift(oid); localStorage.setItem('MY_ORDERS', JSON.stringify(myOrderIds));
                cart = []; updateCartUI(); switchTab('track');
                Swal.fire({ icon: 'success', title: 'Berhasil!', timer: 2000 });
            } catch (e) { Swal.fire('Gagal', 'Terjadi kesalahan jaringan.', 'error'); }
        }

        function renderTracking() {
            const list = document.getElementById('orderTrackingList'); if(!list) return;
            const myOrders = DB.transactions.filter(t => myOrderIds.includes(t.ID));
            if (myOrders.length === 0) { list.innerHTML = `<div class="py-20 text-center flex flex-col items-center justify-center gap-4 text-slate-300 italic font-bold uppercase tracking-widest text-[10px]"><i data-lucide="clock" class="w-10 h-10 opacity-20"></i> Belum ada pesanan aktif.</div>`; lucide.createIcons(); return; }
            
            list.innerHTML = myOrders.reverse().map(trx => {
                let currentStep = trx.Status === 'Pending' ? 1 : (trx.Status === 'Cooking' ? 2 : 3);
                let statusClass = trx.Status === 'Pending' ? 'status-pending' : (trx.Status === 'Cooking' ? 'status-cooking' : 'status-ready');
                
                return `
                <div class="track-card animate-pop shadow-md">
                    <div class="flex justify-between items-start">
                        <div>
                            <span class="text-[10px] font-black text-slate-400 uppercase tracking-widest italic leading-none">Order #${trx.ID.slice(-4)}</span>
                            <div class="flex items-center gap-2 mt-1">
                                <span class="status-pill ${statusClass}">${trx.Status}</span>
                                <span class="text-[10px] font-bold text-slate-300">|</span>
                                <span class="text-[10px] font-bold text-slate-400 uppercase">${new Date(trx.Date).toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'})}</span>
                            </div>
                        </div>
                        <span class="text-sm font-black text-violet-600 italic tracking-tighter">Rp ${Number(trx.Total).toLocaleString()}</span>
                    </div>

                    <div class="track-step-container">
                        ${['Antre','Masak','Saji'].map((s,i)=>`
                            <div class="track-step ${i+1 <= currentStep ? 'active' : ''}">
                                ${i < 2 ? `<div class="track-line ${i+1 < currentStep ? '!bg-violet-600' : ''}"></div>` : ''}
                                <div class="track-circle"></div>
                                <span class="track-label">${s}</span>
                            </div>
                        `).join('')}
                    </div>

                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100/50">
                        <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-1 opacity-50 italic">Items:</p>
                        <p class="text-[11px] font-bold text-slate-700 leading-relaxed uppercase tracking-tight italic">${trx.Items}</p>
                        <div class="mt-2 pt-2 border-t border-slate-200 flex justify-between items-center">
                            <span class="text-[8px] font-black text-slate-400 uppercase italic opacity-70">${trx.Type}</span>
                            <i data-lucide="chevron-right" class="w-3 h-3 text-slate-300"></i>
                        </div>
                    </div>
                </div>`;
            }).join('');
            lucide.createIcons();
        }

        function updateHeaderUI() {
            const name = localStorage.getItem('LAST_CUST_NAME') || 'Pelanggan';
            const el = document.getElementById('welcomeMsg'); if(el) el.innerText = `Hey, ${name}`;
            const av = document.getElementById('userAvatar'); if(av) av.src = `https://ui-avatars.com/api/?name=${name}&background=7c3aed&color=fff&rounded=true`;
        }

        function filterMenu(cat) { activeCategory = cat; document.querySelectorAll('.cat-card').forEach(c => c.classList.toggle('active', c.id === `cat-${cat.toLowerCase()}`)); renderMenu(); }
        function changeName() { Swal.fire({ title: 'Ganti Nama', input: 'text', confirmButtonColor: '#7c3aed' }).then(r => { if(r.isConfirmed && r.value) { localStorage.setItem('LAST_CUST_NAME', r.value); updateHeaderUI(); } }); }
        function changeLocation() { Swal.fire({ title: 'Lokasi', input: 'select', inputOptions: {'Meja 01':'Meja 01','Meja 02':'Meja 02','Area Tunggu':'Area Tunggu'}, confirmButtonColor: '#7c3aed' }).then(r => { if(r.isConfirmed) document.getElementById('locationLabel').innerText = r.value; }); }
        
        function showDetail(id) { 
            const m = DB.menu.find(x => x.ID == id); if(!m) return; 
            Swal.fire({ 
                title: `<div class="text-xl font-black italic uppercase tracking-tighter">${m.Name}</div>`, 
                html: `<div class="text-left"><img src="${m.Img.includes('?') ? m.Img : m.Img+'?w=600&q=80'}" class="w-full h-48 rounded-[25px] object-cover mb-4 shadow-lg"><p class="text-slate-500 text-xs font-medium leading-relaxed mb-4">${m.Description || 'RM Pangkalan.'}</p><div class="flex justify-between items-center bg-violet-50 p-4 rounded-2xl border border-violet-100"><span class="text-[10px] font-black text-violet-400 uppercase italic">Harga Satuan</span><span class="text-xl font-black text-violet-600 italic">Rp ${Number(m.Price).toLocaleString()}</span></div></div>`, 
                showConfirmButton: true, confirmButtonText: 'Order', confirmButtonColor: '#7c3aed', 
                customClass: { popup: 'detail-modal', confirmButton: 'rounded-2xl font-bold py-4 w-full text-xs uppercase italic' } 
            }).then((r) => { if (r.isConfirmed) addToCart(id); }); 
        }
        
        function toggleDrawer(open) { const dr = document.getElementById('cartDrawer'); if(dr) open ? dr.classList.add('active') : dr.classList.remove('active'); updateCartUI(); }
    </script>
</body>
</html>
